#
# This workflow calls the main distribution pipeline from DuckDB to build, test and (optionally) release the extension
#
name: Main Extension Distribution Pipeline
on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}-${{ github.ref != 'refs/heads/main' && github.sha || '' }}
  cancel-in-progress: true

jobs:
  # Build for DuckDB v1.4.4 (previous stable)
  duckdb-v1_4_4-build:
    name: Build extension (DuckDB v1.4.4)
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.4.4
    with:
      duckdb_version: v1.4.4
      ci_tools_version: v1.4.4
      extension_name: anofox_scenario
      artifact_postfix: _v1.4.4
      exclude_archs: windows_amd64_mingw

  duckdb-v1_4_4-deploy:
    name: Deploy extension (DuckDB v1.4.4)
    needs: duckdb-v1_4_4-build
    uses: ./.github/workflows/_extension_deploy.yml
    secrets: inherit
    with:
      duckdb_version: v1.4.4
      extension_name: anofox_scenario
      artifact_postfix: _v1.4.4
      exclude_archs: windows_amd64_mingw
      deploy_latest: ${{ startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' }}
      deploy_versioned: ${{ startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' }}

  # Build for DuckDB v1.5.0 (previous stable)
  duckdb-v1_5_0-build:
    name: Build extension (DuckDB v1.5.0)
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.5.0
    with:
      duckdb_version: v1.5.0
      ci_tools_version: v1.5.0
      extension_name: anofox_scenario
      artifact_postfix: _v1.5.0
      exclude_archs: windows_amd64_mingw

  duckdb-v1_5_0-deploy:
    name: Deploy extension (DuckDB v1.5.0)
    needs: duckdb-v1_5_0-build
    uses: ./.github/workflows/_extension_deploy.yml
    secrets: inherit
    with:
      duckdb_version: v1.5.0
      extension_name: anofox_scenario
      artifact_postfix: _v1.5.0
      exclude_archs: windows_amd64_mingw
      deploy_latest: ${{ startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' }}
      deploy_versioned: ${{ startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' }}

  # Build for DuckDB v1.5.1 (latest stable)
  duckdb-v1_5_1-build:
    name: Build extension (DuckDB v1.5.1)
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.5.1
    with:
      duckdb_version: v1.5.1
      ci_tools_version: v1.5.1
      extension_name: anofox_scenario
      artifact_postfix: _v1.5.1
      exclude_archs: windows_amd64_mingw

  # Smoke test: downloads the built artifact and verifies it loads with a real pip-installed DuckDB,
  # exercising the same path a user would take (not build-internal binaries).
  smoke-test-v1_5_1:
    name: Smoke test (DuckDB v1.5.1, linux_amd64)
    runs-on: ubuntu-latest
    needs: duckdb-v1_5_1-build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: 'true'

      - name: Checkout DuckDB submodule to v1.5.1
        run: cd duckdb && git checkout v1.5.1

      - name: Download linux_amd64 extension artifact
        uses: actions/download-artifact@v4
        with:
          name: anofox_scenario-v1.5.1-extension-linux_amd64_v1.5.1
          path: /tmp/extension

      - name: Run smoke test
        run: |
          ext=$(find /tmp/extension -name "*.duckdb_extension" | head -1)
          echo "Artifact: $ext"
          python3 scripts/smoke_test.py --extension "$ext" --duckdb-version 1.5.1

  duckdb-v1_5_1-deploy:
    name: Deploy extension (DuckDB v1.5.1)
    needs: duckdb-v1_5_1-build
    uses: ./.github/workflows/_extension_deploy.yml
    secrets: inherit
    with:
      duckdb_version: v1.5.1
      extension_name: anofox_scenario
      artifact_postfix: _v1.5.1
      exclude_archs: windows_amd64_mingw
      deploy_latest: ${{ startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' }}
      deploy_versioned: ${{ startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' }}
